name: ingest

on:
  workflow_dispatch:
    inputs:
      season-id:
        description: 'Season id (e.g. 2026-april)'
        required: true
        type: string
      pdfUrl:
        description: 'HTTPS URL to the RSD release list PDF'
        required: true
        type: string

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Ingest season PDF
        env:
          DISCOGS_CONSUMER_KEY: ${{ secrets.DISCOGS_CONSUMER_KEY }}
          DISCOGS_CONSUMER_SECRET: ${{ secrets.DISCOGS_CONSUMER_SECRET }}
          METABRAINZ_ACCESS_TOKEN: ${{ secrets.METABRAINZ_ACCESS_TOKEN }}
        run: pnpm tsx scripts/ingest.ts "${{ inputs.season-id }}" "${{ inputs.pdfUrl }}"

      - name: Fetch album art
        env:
          DISCOGS_CONSUMER_KEY: ${{ secrets.DISCOGS_CONSUMER_KEY }}
          DISCOGS_CONSUMER_SECRET: ${{ secrets.DISCOGS_CONSUMER_SECRET }}
          METABRAINZ_ACCESS_TOKEN: ${{ secrets.METABRAINZ_ACCESS_TOKEN }}
        run: pnpm tsx scripts/fetch-art.ts "${{ inputs.season-id }}"

      - name: Validate JSON
        run: pnpm tsx scripts/validate.ts

      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add current.json seasons.json releases/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: ingest ${{ inputs.season-id }}"
            git push origin main
          fi
