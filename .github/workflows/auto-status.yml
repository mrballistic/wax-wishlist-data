name: auto-status

on:
  schedule:
    # Daily at 12:00 UTC — well after any timezone's RSD drop day has ended.
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  recompute:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Recompute statuses from today's date
        run: pnpm tsx scripts/auto-status.ts

      - name: Validate JSON
        run: pnpm tsx scripts/validate.ts

      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add current.json seasons.json
          if git diff --staged --quiet; then
            echo "No status changes today."
          else
            git commit -m "chore: auto-status recompute"
            git push origin main
          fi
